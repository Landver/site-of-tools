services:
  site-of-tools:
    build: .
    container_name: site-of-tools
    restart: unless-stopped
    # Published on the docker bridge gateway (172.17.0.1) so the nginx
    # reverse-proxy container — which sits on a separate bridge — reaches the app
    # at 172.17.0.1:8080. Bound to that IP only, not 0.0.0.0, so the app is not
    # exposed on the public interface.
    ports:
      - "172.17.0.1:8080:8080"
    # All configuration lives in the env files — nothing is restated here:
    #   .env       base values (also used by `make dev` / `make run`)
    #   .env.prod  production overrides (APP_ENV, BASE_DOMAIN)
    # Read in order; later files win.
    env_file:
      - .env
      - .env.prod
    volumes:
      # DB .BINs stay on the host, mounted read-only at the same repo-relative
      # path the app uses in dev. The binary runs with cwd=/, so the relative
      # IP2LOCATION_* / IP2PROXY_* paths from .env resolve here unchanged — no
      # separate container paths to keep in sync.
      - ./iptolocation/assets:/iptolocation/assets:ro
