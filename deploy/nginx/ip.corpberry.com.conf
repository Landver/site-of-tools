# ip.corpberry.com — the IP tools subdomain. Same upstream (:8080); the Go app
# routes by the Host header. Canonical SOURCE — copy into the proxy conf.d + reload.
server {
    listen 443 ssl;
    server_name ip.corpberry.com;

    client_max_body_size 3M;

    location / {
        proxy_pass http://172.17.0.1:8080;
        proxy_set_header Host $host;                          # REQUIRED — host routing
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    ssl_certificate     /etc/letsencrypt/live/llm.corpberry.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/llm.corpberry.com/privkey.pem;
}
