# corpberry.com — apex (portfolio + tools index).
# Canonical SOURCE for this vhost. The reverse proxy loads configs from its own
# conf.d (a Docker-mounted dir), so "deploy" = copy this file into that conf.d
# and reload nginx. See deploy/nginx/README.md.
#
# TLS: reuses the existing Let's Encrypt cert already in the proxy, exactly like
# the other *.corpberry.com vhosts. Cloudflare terminates the browser-facing TLS
# (proxy ON), so the origin cert name does not need to match this server_name.
server {
    listen 443 ssl;
    server_name corpberry.com;

    client_max_body_size 3M;

    location / {
        proxy_pass http://172.17.0.1:8080;
        proxy_set_header Host $host;                          # REQUIRED — host routing
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    ssl_certificate     /etc/letsencrypt/live/llm.corpberry.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/llm.corpberry.com/privkey.pem;
}
