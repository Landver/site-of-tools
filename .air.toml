# Live reload for dev (github.com/air-verse/air). Run via `make dev`.
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ."
  bin = "./tmp/server"
  # Only Go changes need a rebuild. In dev (APP_ENV=dev) templates and static
  # files are read from disk and re-parsed per request, so editing an .html just
  # needs a browser refresh — no rebuild, no lost state.
  include_ext = ["go"]
  exclude_dir = ["tmp", "bin", "vendor", "shared/static", "iptools/assets", "docs"]
  exclude_regex = ["_test\\.go"]
  delay = 500
  stop_on_error = true

[misc]
  clean_on_exit = true
