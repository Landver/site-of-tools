{{define "partials/header"}}
<header class="border-b border-line">
  <div class="w-full px-6 py-4 flex items-center gap-4">
    <!-- Logo always links to the apex (corpberry.com), even from a tool subdomain. -->
    <a href="{{apexURL}}" class="flex items-center gap-2 text-sm font-medium text-muted hover:text-strong">
      <span class="inline-block h-3 w-3 rounded-full bg-brand"></span>
      corpberry.com
    </a>

    <nav class="ml-auto flex items-center gap-5 text-sm">
      <!-- Tools: a dropdown of the tool catalog (single source: site.Tools). -->
      <div class="relative" x-data="{ open: false }"
           @click.outside="open = false" @keydown.escape.window="open = false">
        <button type="button" @click="open = !open"
                class="flex items-center gap-1 text-muted hover:text-strong">
          Tools
          <svg class="h-3 w-3 transition-transform" :class="open && 'rotate-180'"
               viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <path d="M3 4.5 6 7.5 9 4.5" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div x-show="open" x-cloak x-transition.opacity
             class="absolute right-0 z-10 mt-2 w-56 rounded-lg border border-line bg-surface p-1 shadow-lg">
          {{range navTools}}
          <a href="{{.URL}}"
             class="block rounded-md px-3 py-2 text-muted hover:bg-line hover:text-strong">{{.Name}}</a>
          {{else}}
          <span class="block px-3 py-2 text-faint">No tools yet</span>
          {{end}}
        </div>
      </div>

      <!-- Source: this site's repo. -->
      <a href="https://github.com/Landver/site-of-tools" target="_blank" rel="noopener"
         aria-label="Source on GitHub" class="text-muted hover:text-strong">
        <svg class="h-5 w-5" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>

      <!-- Theme toggle: sun shown in dark mode, moon in light. Handler set in head. -->
      <button type="button" onclick="toggleTheme()" aria-label="Toggle color theme"
              class="text-muted hover:text-strong">
        <svg class="hidden h-5 w-5 dark:block" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
        <svg class="h-5 w-5 dark:hidden" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </nav>
  </div>
</header>
{{end}}
