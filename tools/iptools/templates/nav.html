{{/* Sub-nav for IP Tools suite, styled as segmented control → reads as view
     switcher not body text. .Active = "lookup", "cidr", or "history". Links
     relative → stay on ip.corpberry.com. */}}
{{define "ip/nav"}}
<div class="mb-8 inline-flex rounded-lg border border-line bg-surface p-1 text-sm font-medium">
  <a href="/"
     class="rounded-md px-4 py-1.5 transition {{if eq .Active "lookup"}}bg-brand text-white{{else}}text-muted hover:text-strong{{end}}">
    IP lookup
  </a>
  <a href="/cidr"
     class="rounded-md px-4 py-1.5 transition {{if eq .Active "cidr"}}bg-brand text-white{{else}}text-muted hover:text-strong{{end}}">
    Subnet calculator
  </a>
  <a href="/history"
     class="rounded-md px-4 py-1.5 transition {{if eq .Active "history"}}bg-brand text-white{{else}}text-muted hover:text-strong{{end}}">
    History
  </a>
</div>
{{end}}
